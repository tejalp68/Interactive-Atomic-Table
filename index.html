<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Periodic Table</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Interactive Periodic Table</h1>
  <div id="table"></div>

  <div id="element-info" class="hidden">
    <button id="close">X</button>
    <h2 id="element-name"></h2>
    <p><strong>Symbol:</strong> <span id="element-symbol"></span></p>
    <p><strong>Atomic Number:</strong> <span id="element-number"></span></p>
    <p><strong>Atomic Mass:</strong> <span id="element-mass"></span></p>
    <p><strong>Group/Block:</strong> <span id="element-group"></span></p>
    <p><strong>Electron Configuration:</strong> <span id="element-config"></span></p>
    <p><strong>Uses:</strong> <span id="element-uses"></span></p>
    <p><strong>Facts:</strong> <span id="element-facts"></span></p>
  </div>

  <script src="script.js"></script>

</body>
</html>
